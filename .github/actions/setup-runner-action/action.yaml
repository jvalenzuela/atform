name: 'Setup Runner'
description: 'Common configuration for runner VMs.'

inputs:
  python-version:
    description: 'Python version to install.'
    required: true

runs:
  using: "composite"
  steps:
    - name: Install target Python version
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    # Required for pycairo(svglib requirement), which doesn't have built
    # distributions for Linux.
    - name: Install cairo
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install libcairo2-dev

    - name: Install requirements
      shell: bash
      run: |
        pip install toml-to-requirements
        toml-to-req --toml-file pyproject.toml
        pip install -r requirements.txt
